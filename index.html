<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BacktestLab — Motor de Estrategias</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg:      #080b0f;
    --surface: #0e1318;
    --border:  #1c2530;
    --accent:  #00ff88;
    --accent2: #0af;
    --red:     #ff4560;
    --text:    #e2e8f0;
    --muted:   #4a5568;
    --mono:    'Space Mono', monospace;
    --sans:    'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* HEADER */
  header { padding: 48px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
  .logo { font-family: var(--sans); font-weight: 800; font-size: 28px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }
  .tagline { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: 3px; text-transform: uppercase; }

  /* API BAR */
  .api-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .api-label { font-family: var(--mono); font-size: 10px; color: var(--muted); white-space: nowrap; letter-spacing: 2px; text-transform: uppercase; }
  .api-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 8px 12px; border-radius: 6px; outline: none; transition: border-color .2s; }
  .api-input:focus { border-color: var(--accent); color: var(--text); }

  /* LAYOUT */
  .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 780px) { .main-grid { grid-template-columns: 1fr; } }

  /* PANEL */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .panel-title { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* FORM */
  .field { margin-bottom: 16px; }
  label { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 9px 13px; border-radius: 6px; outline: none; transition: border-color .2s; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* BUTTON */
  .btn-run { width: 100%; background: var(--accent); color: #000; font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; border: none; padding: 14px; border-radius: 8px; cursor: pointer; margin-top: 4px; transition: opacity .2s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-run:hover { opacity: .85; }
  .btn-run:active { transform: scale(.98); }
  .btn-run:disabled { opacity: .35; cursor: not-allowed; }
  .spinner { width: 14px; height: 14px; border: 2px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  @media (max-width: 560px) { .metrics-grid { grid-template-columns: 1fr 1fr; } }
  .mc { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .mc-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .mc-value { font-family: var(--mono); font-size: 20px; font-weight: 700; line-height: 1; }
  .pos { color: var(--accent); }
  .neg { color: var(--red); }
  .neu { color: var(--accent2); }

  /* CHART */
  .chart-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; height: 240px; position: relative; }

  /* TRADES */
  .trades-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  th { background: #0a0e12; padding: 10px 14px; text-align: left; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.015); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
  .badge.win  { background: rgba(0,255,136,.1); color: var(--accent); }
  .badge.loss { background: rgba(255,69,96,.1);  color: var(--red); }

  /* ERROR */
  #error-box { display: none; background: rgba(255,69,96,.07); border: 1px solid rgba(255,69,96,.25); border-radius: 8px; padding: 14px 18px; font-family: var(--mono); font-size: 12px; color: var(--red); margin-bottom: 16px; }

  /* SMOOTH BAR */
  .sbar-bg { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--red), #f0883e, var(--accent)); transition: width 1s ease; }

  #results { display: none; }
  .pb { padding-bottom: 60px; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo"><div class="logo-dot"></div>BacktestLab</div>
    <div class="tagline">RSI + EMA Strategy Engine</div>
  </header>

  <div class="api-bar">
    <span class="api-label">API</span>
    <input class="api-input" id="apiUrl" value="https://backtest-api-vc7i.onrender.com">
  </div>

  <div class="main-grid">

    <!-- FORM -->
    <div>
      <div class="panel">
        <div class="panel-title">Configuración</div>

        <div class="field">
          <label>Ticker</label>
          <input id="ticker" type="text" value="EURUSD=X" placeholder="EURUSD=X, BTC-USD, AAPL">
        </div>

        <div class="field">
          <label>Timeframe</label>
          <select id="timeframe">
            <option value="1m">1 minuto</option>
            <option value="5m">5 minutos</option>
            <option value="15m">15 minutos</option>
            <option value="30m">30 minutos</option>
            <option value="1h" selected>1 hora</option>
            <option value="2h">2 horas</option>
            <option value="4h">4 horas</option>
            <option value="1d">Diario</option>
            <option value="1wk">Semanal</option>
            <option value="1mo">Mensual</option>
          </select>
        </div>

        <div class="row2">
          <div class="field"><label>Inicio</label><input id="start" type="date" value="2025-01-01"></div>
          <div class="field"><label>Fin</label><input id="end" type="date"></div>
        </div>

        <div class="row2">
          <div class="field"><label>RSI Period</label><input id="rsi_period" type="number" value="14" min="2" max="100"></div>
          <div class="field"><label>EMA Period</label><input id="ema_period" type="number" value="50" min="2" max="500"></div>
        </div>

        <div class="row2">
          <div class="field"><label>RSI Entry (&lt;)</label><input id="rsi_entry" type="number" value="40" min="1" max="49"></div>
          <div class="field"><label>RSI Exit (&gt;)</label><input id="rsi_exit"  type="number" value="60" min="51" max="99"></div>
        </div>

        <div class="row2">
          <div class="field"><label>Capital ($)</label><input id="init_cash" type="number" value="10000" min="1"></div>
          <div class="field"><label>Comisión (%)</label><input id="fees" type="number" value="0.1" min="0" max="10" step="0.01"></div>
        </div>

        <button class="btn-run" id="runBtn" onclick="runBacktest()">
          <div class="spinner" id="spinner"></div>
          <span id="btnText">▶ Ejecutar Backtest</span>
        </button>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="pb">
      <div id="error-box"></div>
      <div id="results">

        <!-- SUMMARY -->
        <div class="panel">
          <div class="panel-title">Resumen</div>
          <div class="metrics-grid">
            <div class="mc"><div class="mc-label">Strategy Return</div><div class="mc-value" id="m-ret">—</div></div>
            <div class="mc"><div class="mc-label">Buy &amp; Hold</div><div class="mc-value neu" id="m-bh">—</div></div>
            <div class="mc"><div class="mc-label">Final Value</div><div class="mc-value neu" id="m-val">—</div></div>
            <div class="mc"><div class="mc-label">Sharpe Ratio</div><div class="mc-value" id="m-sharpe">—</div></div>
            <div class="mc"><div class="mc-label">Max Drawdown</div><div class="mc-value neg" id="m-dd">—</div></div>
            <div class="mc"><div class="mc-label">Win Rate</div><div class="mc-value" id="m-wr">—</div></div>
          </div>
          <div class="chart-wrap"><canvas id="eqChart"></canvas></div>
        </div>

        <!-- ANALYSIS -->
        <div class="panel">
          <div class="panel-title">Análisis Avanzado</div>
          <div class="metrics-grid">
            <div class="mc"><div class="mc-label">Expectancy (EV)</div><div class="mc-value" id="a-ev">—</div></div>
            <div class="mc"><div class="mc-label">Avg Win</div><div class="mc-value pos" id="a-win">—</div></div>
            <div class="mc"><div class="mc-label">Avg Loss</div><div class="mc-value neg" id="a-loss">—</div></div>
            <div class="mc"><div class="mc-label">Avg R:R</div><div class="mc-value neu" id="a-rr">—</div></div>
            <div class="mc"><div class="mc-label">Racha Pérdidas</div><div class="mc-value neg" id="a-consec">—</div></div>
            <div class="mc">
              <div class="mc-label">Equity Smoothness</div>
              <div class="mc-value" id="a-smooth">—</div>
              <div class="sbar-bg"><div class="sbar-fill" id="smoothBar" style="width:0%"></div></div>
            </div>
          </div>
        </div>

        <!-- TRADES -->
        <div class="panel">
          <div class="panel-title">Trades</div>
          <div class="trades-scroll">
            <table>
              <thead>
                <tr><th>#</th><th>Entry</th><th>Exit</th><th>Return %</th><th>PnL ($)</th><th>Estado</th></tr>
              </thead>
              <tbody id="tradesBody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
let chart = null;

async function runBacktest() {
  const btn     = document.getElementById('runBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errBox  = document.getElementById('error-box');
  const results = document.getElementById('results');
  const apiUrl  = document.getElementById('apiUrl').value.replace(/\/$/, '');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent   = 'Calculando...';
  errBox.style.display  = 'none';
  results.style.display = 'none';

  const config = {
    ticker:     document.getElementById('ticker').value.trim(),
    timeframe:  document.getElementById('timeframe').value,
    start:      document.getElementById('start').value,
    end:        document.getElementById('end').value,
    rsi_period: parseInt(document.getElementById('rsi_period').value),
    ema_period: parseInt(document.getElementById('ema_period').value),
    rsi_entry:  parseFloat(document.getElementById('rsi_entry').value),
    rsi_exit:   parseFloat(document.getElementById('rsi_exit').value),
    init_cash:  parseFloat(document.getElementById('init_cash').value),
    fees:       parseFloat(document.getElementById('fees').value) / 100,
  };

  try {
    const res  = await fetch(`${apiUrl}/backtest`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
    render(data);
    results.style.display = 'block';
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) {
    errBox.textContent   = '❌  ' + e.message;
    errBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent   = '▶ Ejecutar Backtest';
  }
}

function render(data) {
  const s = data.summary || {};
  const a = data.analysis || {};

  // Summary
  setVal('m-ret',    s.strategy_return_pct, '%', true);
  setVal('m-bh',     s.buyhold_return_pct,  '%', false);
  document.getElementById('m-val').textContent = '$' + num(s.final_value);
  setVal('m-sharpe', s.sharpe_ratio,        '',  true);
  document.getElementById('m-dd').textContent  = fmt(s.max_drawdown_pct) + '%';
  setVal('m-wr',     s.win_rate_pct,        '%', false);

  // Analysis
  setVal('a-ev',   a.expectancy,        '%', true);
  document.getElementById('a-win').textContent    = '+' + fmt(a.avg_win_pct)  + '%';
  document.getElementById('a-loss').textContent   = fmt(a.avg_loss_pct) + '%';
  document.getElementById('a-rr').textContent     = fmt(a.avg_rr);
  document.getElementById('a-consec').textContent = (a.max_consec_losses || 0) + ' trades';
  const sm = a.equity_smoothness || 0;
  const smEl = document.getElementById('a-smooth');
  smEl.textContent = sm.toFixed(2);
  smEl.className   = 'mc-value ' + (sm > .7 ? 'pos' : sm > .4 ? 'neu' : 'neg');
  setTimeout(() => document.getElementById('smoothBar').style.width = (sm * 100) + '%', 100);

  // Chart
  if (chart) chart.destroy();
  const eq  = data.equity_curve || [];
  const ctx = document.getElementById('eqChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 200);
  grad.addColorStop(0, 'rgba(0,255,136,.18)');
  grad.addColorStop(1, 'rgba(0,255,136,0)');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: eq.map(p => p.date),
      datasets: [{
        data: eq.map(p => p.value),
        borderColor: 'rgba(0,255,136,.9)',
        backgroundColor: grad,
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ' $' + num(c.raw) } }
      },
      scales: {
        x: { ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 10 }, maxTicksLimit: 6 }, grid: { color: '#1c2530' } },
        y: { ticks: { color: '#4a5568', font: { family: 'Space Mono', size: 10 }, callback: v => '$' + v.toLocaleString() }, grid: { color: '#1c2530' } },
      }
    }
  });

  // Trades
  const tbody = document.getElementById('tradesBody');
  tbody.innerHTML = '';
  (data.trades || []).forEach(t => {
    const c = t.status === 'win' ? 'pos' : 'neg';
    tbody.innerHTML += `
      <tr>
        <td style="color:var(--muted)">${t.trade_id}</td>
        <td>${t.entry_date}</td>
        <td>${t.exit_date}</td>
        <td class="${c}">${t.return_pct > 0 ? '+' : ''}${t.return_pct.toFixed(2)}%</td>
        <td class="${c}">${t.pnl > 0 ? '+' : ''}$${Math.abs(t.pnl).toFixed(2)}</td>
        <td><span class="badge ${t.status}">${t.status.toUpperCase()}</span></td>
      </tr>`;
  });
}

function fmt(v)  { return v == null ? '—' : (v > 0 ? '+' : '') + parseFloat(v).toFixed(2); }
function num(v)  { return v == null ? '—' : parseFloat(v).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function setVal(id, v, suf, colorize) {
  const el = document.getElementById(id);
  el.textContent = fmt(v) + suf;
  if (colorize) el.className = 'mc-value ' + (parseFloat(v) > 0 ? 'pos' : 'neg');
}

document.getElementById('end').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
